name: Deploy to Cloudflare

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - "packages/**"
      - ".github/workflows/cf-deploy.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - transcriptor
          - web
          - all

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            transcriptor:
              - 'services/transcriptor/**'
              - 'packages/**'
            web:
              - 'services/web/**'
              - 'packages/**'

      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.service }}" == "all" ]]; then
              echo 'matrix=["transcriptor","web"]' >> "$GITHUB_OUTPUT"
            else
              echo 'matrix=["${{ inputs.service }}"]' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'matrix=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != ''
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prd' || 'dev' }}
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
        include:
          - service: transcriptor
            working-directory: services/transcriptor
          - service: web
            working-directory: services/web
    steps:
      - uses: actions/checkout@v4

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Deploy to Cloudflare
        run: pnpm --dir "${{ matrix.working-directory }}" deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
